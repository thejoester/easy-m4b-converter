name: Build EXE

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow tkinterdnd2 pyinstaller

      - name: Extract version from tag
        id: vars
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build executables
        run: |
          pyinstaller --noconfirm --onefile --windowed --icon=audiobook-converter.ico audiobook-converter.pyw
          pyinstaller --noconfirm --onefile --windowed --icon=audiobook-converter2.ico m4b-chapter-editor.pyw

      - name: Rename outputs
        run: move dist\\audiobook-converter.exe dist\\AudiobookConverter-${{ env.VERSION }}.exe
      - name: Rename chapter editor output
        run: move dist\\m4b-chapter-editor.exe dist\\M4BChapterEditor-${{ env.VERSION }}.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AudiobookTools-${{ env.VERSION }}
          path: |
            dist/AudiobookConverter-${{ env.VERSION }}.exe
            dist/M4BChapterEditor-${{ env.VERSION }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/AudiobookConverter-${{ env.VERSION }}.exe
            dist/M4BChapterEditor-${{ env.VERSION }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
